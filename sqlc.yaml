# This file configures sqlc generation for Saturn repository queries.
version: "2"
sql:
  - name: "auth"
    engine: "postgresql"
    schema: "migrations"
    queries: "internal/platform/auth/queries"
    gen:
      go:
        package: "authsqlc"
        out: "internal/platform/auth/sqlc"
        sql_package: "database/sql"
        emit_sql_as_comment: true
        omit_unused_structs: true
