# This Compose file runs Saturn from the published GHCR image with PostgreSQL,
# Redis, and local file storage. Only the web app is exposed on port 8080.
services:
  app:
    image: ghcr.io/stark-lin/saturn:latest
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
    volumes:
      - objects-data:/app/objects

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: saturn
      POSTGRES_USER: saturn
      POSTGRES_PASSWORD: saturn
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine

volumes:
  postgres-data:
  objects-data: